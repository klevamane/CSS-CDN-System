name: Deploy CSS to S3 and Invalidate CloudFront
on:
  push:
    branches:
      - main
      - develop

    paths:
      - 'styles/**'  # This workflow will trigger on changes to files in the styles directory

jobs:
    deploy:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v3

        - name: Validate required secrets
          run: |
            if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] || [ -z "${{ secrets.AWS_REGION }}" ] || [ -z "${{ secrets.S3_CDN_BUCKET_NAME }}" ] || [ -z "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
              echo "One or more required secrets are missing."
              exit 1
            fi

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v2
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ secrets.AWS_REGION }}

        - name: Validate CSS (optional)
          run: |
            # Install CSS validator
            npm install -g stylelint
            # Run validation on CSS files
            stylelint "styles/**/*.css" || echo "Validation warnings found"

        - name: Minify CSS (optional)
          run: |
            # Install CSS minifier
            npm install -g clean-css-cli
            # Create minified versions
            mkdir -p dist
            for file in styles/*.css; do
              filename=$(basename "$file")
              cleancss -o "dist/$filename" "$file"
            done

#        - name: Install dependencies
#          run: npm install stylelint stylelint-config-standard --save-dev
#
#        - name: Save npm cache
#          if: steps.cache.outputs.cache-hit != 'true'
#          uses: actions/cache@v3
#          with:
#            path: node_modules
#            key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
#        - name: Lint CSS
#          run: npx stylelint "styles/**/*.css"

        - name: Sync CSS to S3
          run: |
            aws s3 sync ./styles s3://${{secrets.S3_CDN_BUCKET_NAME}} --delete --acl public-read

        - name: Invalidate CloudFront cache
          run: |
                # Invalidate all CSS files to ensure fresh content
                aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
